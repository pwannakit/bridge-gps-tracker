<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Bridge Foundation Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 350px; width: 100%; z-index: 10; border-radius: 8px; }
        #formModal, #photoModal, #loadingModal { z-index: 9999; }
        #foundationList::-webkit-scrollbar { width: 4px; }
        #foundationList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-4 font-sans">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-blue-700 text-white p-5 text-center shadow-md">
            <h1 class="text-xl font-bold tracking-tight">ระบบพิกัดฐานรากสะพาน</h1>
            <p class="text-xs text-blue-100 mt-1 opacity-80">Cloud Sync Enabled</p>
        </div>
        
        <div class="p-4">
            <div class="mb-4">
                <button id="trackLocationBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center">
                    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    เริ่มติดตามตำแหน่ง GPS
                </button>
            </div>

            <div id="locationData" class="bg-slate-50 p-3 rounded-xl border border-slate-200 mb-4 hidden animate-pulse">
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="text-slate-500 font-medium italic">ตำแหน่งปัจจุบัน:</div>
                    <div id="currentCoords" class="font-mono text-slate-800 text-right font-bold">-</div>
                    <div class="text-slate-500 font-medium italic">ความแม่นยำ:</div>
                    <div id="accVal" class="font-mono text-blue-600 text-right font-bold">-</div>
                </div>
            </div>

            <div id="map" class="mb-4 border border-slate-200 shadow-inner"></div>

            <div id="navStatus" class="bg-red-50 p-4 rounded-xl border border-red-200 mb-4 hidden text-center shadow-sm">
                <p class="text-xs text-red-600 font-bold uppercase tracking-wider">กำลังเดินไปยัง: <span id="navTargetName" class="underline"></span></p>
                <p class="text-3xl font-black text-red-700 my-1" id="navDistance">-- เมตร</p>
                <button id="stopNavBtn" class="mt-2 text-xs bg-slate-500 text-white px-4 py-1.5 rounded-full hover:bg-slate-600 transition-colors">หยุดนำทาง</button>
            </div>

            <div class="flex justify-between items-center mb-3 mt-4">
                <h2 class="text-lg font-bold text-slate-800 flex items-center">จุดที่บันทึกไว้</h2>
                <button id="openAddModalBtn" class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2 px-4 rounded-lg flex items-center shadow-md active:scale-95 transition-all">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    เพิ่มจุด
                </button>
            </div>

            <div id="foundationList" class="space-y-3 max-h-[400px] overflow-y-auto pb-6">
                <p class="text-center text-slate-400 py-10 text-sm">ยังไม่มีข้อมูล...</p>
            </div>
        </div>
    </div>

    <div id="formModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-in fade-in zoom-in duration-200">
            <h3 id="modalTitle" class="text-xl font-bold mb-5 text-slate-800 border-b pb-2">บันทึกพิกัดใหม่</h3>
            <input type="hidden" id="formId">
            
            <div class="mb-4">
                <label class="block text-sm font-bold text-slate-700 mb-1">ชื่อฐานราก (เช่น Pier 1)</label>
                <input type="text" id="formName" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-lg">
            </div>

            <div class="mb-4">
                <div class="flex justify-between mb-1 items-end">
                    <label class="block text-sm font-bold text-slate-700">ค่าพิกัด GPS</label>
                    <button id="useCurrentLocationBtn" type="button" class="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-full hover:bg-blue-200 flex items-center">ดึงตำแหน่งปัจจุบัน</button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="formLat" step="any" placeholder="Lat" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm font-mono bg-slate-50">
                    <input type="number" id="formLng" step="any" placeholder="Lng" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm font-mono bg-slate-50">
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold text-slate-700 mb-1">รูปถ่ายหน้างาน</label>
                <input type="file" id="formImage" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                <div class="mt-3 relative hidden" id="imagePreviewContainer">
                    <img id="imagePreview" src="" class="max-h-40 rounded-xl border border-slate-200 w-full object-cover shadow-sm">
                    <button type="button" id="removeImgBtn" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1 shadow-md">✕</button>
                </div>
                <input type="hidden" id="formImageDataUrl">
            </div>

            <div class="flex gap-3 mt-6">
                <button id="cancelBtn" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200">ยกเลิก</button>
                <button id="saveBtn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200">บันทึก & ซิงค์</button>
            </div>
        </div>
    </div>

    <div id="loadingModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center p-4 hidden">
        <svg class="w-12 h-12 text-white animate-spin mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        <p class="text-white font-bold text-lg">กำลังอัปโหลดขึ้นระบบ Cloud...</p>
        <p class="text-slate-300 text-sm mt-2">อาจใช้เวลาสักครู่หากมีรูปภาพขนาดใหญ่</p>
    </div>

    <div id="photoModal" class="fixed inset-0 bg-slate-950/95 flex items-center justify-center p-2 hidden" onclick="this.classList.add('hidden')"><img id="fullPhotoView" src="" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // =======================================================================
        // นำ URL ที่ได้จากขั้นตอนที่ 1 มาวางแทนข้อความในเครื่องหมายคำพูดด้านล่างนี้เลยครับ
        // =======================================================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUrf7tBLEiqkkbTodqCXKWYOqsutzd1bWt7jRdp1gFoXeukqiSPn9nzINrHi8C9qVj/exec"; 
        // =======================================================================

        document.addEventListener('DOMContentLoaded', () => {
            let foundations = JSON.parse(localStorage.getItem('bridge_foundations')) || [];
            let currentPosition = null; let watchId = null; let activeTargetId = null;
            let map = L.map('map').setView([13.7563, 100.5018], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            let userMarker, accuracyCircle, routingLine, markersLayer = L.layerGroup().addTo(map);
            const blueIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41] });
            const redIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41] });

            renderList(); renderMapMarkers();

            const trackBtn = document.getElementById('trackLocationBtn');
            trackBtn.addEventListener('click', () => {
                if (!navigator.geolocation) return alert('ไม่รองรับ GPS');
                if (watchId) {
                    navigator.geolocation.clearWatch(watchId); watchId = null;
                    trackBtn.innerHTML = 'เริ่มติดตามตำแหน่ง GPS'; trackBtn.classList.replace('bg-green-600', 'bg-blue-600');
                    document.getElementById('locationData').classList.add('hidden');
                } else {
                    trackBtn.innerHTML = 'กำลังระบุตำแหน่ง...'; trackBtn.classList.replace('bg-blue-600', 'bg-green-600');
                    document.getElementById('locationData').classList.remove('hidden');
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => {
                            currentPosition = L.latLng(pos.coords.latitude, pos.coords.longitude);
                            trackBtn.innerHTML = 'หยุดติดตาม GPS';
                            document.getElementById('currentCoords').textContent = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                            document.getElementById('accVal').textContent = `±${pos.coords.accuracy.toFixed(1)} m`;
                            if (userMarker) { userMarker.setLatLng(currentPosition); accuracyCircle.setLatLng(currentPosition).setRadius(pos.coords.accuracy); }
                            else { userMarker = L.marker(currentPosition).addTo(map); accuracyCircle = L.circle(currentPosition, { radius: pos.coords.accuracy }).addTo(map); map.setView(currentPosition, 18); }
                            updateNavigation();
                        }, (err) => { alert('หาพิกัดไม่ได้'); trackBtn.click(); }, { enableHighAccuracy: true }
                    );
                }
            });

            function renderMapMarkers() {
                markersLayer.clearLayers(); let bounds = [];
                foundations.forEach(f => {
                    L.marker([f.lat, f.lng], { icon: f.id === activeTargetId ? redIcon : blueIcon }).bindPopup(`<b>${f.name}</b>`).addTo(markersLayer);
                    bounds.push([f.lat, f.lng]);
                });
                if (bounds.length > 0 && !currentPosition) map.fitBounds(bounds, { padding: [50, 50] });
            }

            window.setTarget = (id) => {
                activeTargetId = id; document.getElementById('navStatus').classList.remove('hidden');
                document.getElementById('navTargetName').textContent = foundations.find(f => f.id === id).name;
                renderMapMarkers(); updateNavigation(); window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            document.getElementById('stopNavBtn').addEventListener('click', () => {
                activeTargetId = null; document.getElementById('navStatus').classList.add('hidden');
                if (routingLine) map.removeLayer(routingLine); renderMapMarkers(); renderList();
            });

            function updateNavigation() {
                if (!currentPosition || !activeTargetId) return;
                const target = foundations.find(f => f.id === activeTargetId);
                const dist = currentPosition.distanceTo(L.latLng(target.lat, target.lng));
                document.getElementById('navDistance').textContent = dist.toFixed(1) + ' เมตร';
                if (routingLine) map.removeLayer(routingLine);
                routingLine = L.polyline([currentPosition, L.latLng(target.lat, target.lng)], {color: 'red', weight: 4}).addTo(map);
                renderList();
            }

            function renderList() {
                const list = document.getElementById('foundationList');
                if (foundations.length === 0) { list.innerHTML = '<p class="text-center text-slate-400 py-10">ยังไม่มีข้อมูล...</p>'; return; }
                list.innerHTML = '';
                let sorted = [...foundations];
                if (currentPosition) sorted.sort((a, b) => currentPosition.distanceTo(L.latLng(a.lat, a.lng)) - currentPosition.distanceTo(L.latLng(b.lat, b.lng)));
                
                sorted.forEach(f => {
                    const dist = currentPosition ? currentPosition.distanceTo(L.latLng(f.lat, f.lng)) : null;
                    const item = document.createElement('div');
                    item.className = `p-3 border rounded-2xl flex items-center ${f.id === activeTargetId ? 'bg-red-50 border-red-200' : 'bg-white'}`;
                    item.innerHTML = `
                        ${f.image ? `<img src="${f.image}" class="w-16 h-16 object-cover rounded-xl cursor-pointer" onclick="document.getElementById('fullPhotoView').src='${f.image}'; document.getElementById('photoModal').classList.remove('hidden');">` : `<div class="w-16 h-16 bg-slate-50 flex items-center justify-center text-xs text-slate-400">ไม่มีรูป</div>`}
                        <div class="flex-1 ml-4 overflow-hidden">
                            <h4 class="font-black text-slate-800 text-sm truncate uppercase">${f.name}</h4>
                            <p class="text-[10px] text-slate-400 font-mono">${f.lat.toFixed(6)}, ${f.lng.toFixed(6)}</p>
                            <div class="flex gap-2 mt-2">
                                <button onclick="window.setTarget('${f.id}')" class="bg-blue-50 text-blue-700 px-3 py-1.5 text-[11px] rounded-lg font-black uppercase">นำทาง</button>
                                <button onclick="window.editData('${f.id}')" class="bg-slate-50 text-slate-600 px-3 py-1.5 text-[11px] rounded-lg font-black uppercase">แก้ไข</button>
                                <button onclick="window.deleteData('${f.id}')" class="bg-red-50 text-red-500 px-3 py-1.5 text-[11px] rounded-lg font-black uppercase ml-auto">ลบ</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(item);
                });
            }

            const modal = document.getElementById('formModal');
            document.getElementById('openAddModalBtn').addEventListener('click', () => {
                document.getElementById('formId').value = ''; document.getElementById('formName').value = '';
                document.getElementById('formImage').value = ''; document.getElementById('imagePreviewContainer').classList.add('hidden');
                document.getElementById('formImageDataUrl').value = '';
                if (currentPosition) { document.getElementById('formLat').value = currentPosition.lat.toFixed(6); document.getElementById('formLng').value = currentPosition.lng.toFixed(6); }
                modal.classList.remove('hidden');
            });

            document.getElementById('useCurrentLocationBtn').addEventListener('click', function() {
                if(currentPosition) { document.getElementById('formLat').value = currentPosition.lat.toFixed(6); document.getElementById('formLng').value = currentPosition.lng.toFixed(6); }
                else {
                    this.innerHTML = 'กำลังค้นหา...';
                    navigator.geolocation.getCurrentPosition((pos) => {
                        document.getElementById('formLat').value = pos.coords.latitude.toFixed(6);
                        document.getElementById('formLng').value = pos.coords.longitude.toFixed(6);
                        this.innerHTML = 'ดึงตำแหน่งปัจจุบัน';
                    }, (err) => { alert('หาพิกัดไม่ได้'); this.innerHTML = 'ดึงตำแหน่งปัจจุบัน'; }, { enableHighAccuracy: true });
                }
            });

            document.getElementById('cancelBtn').addEventListener('click', () => modal.classList.add('hidden'));
            document.getElementById('removeImgBtn').addEventListener('click', () => {
                document.getElementById('formImage').value = ''; document.getElementById('formImageDataUrl').value = ''; document.getElementById('imagePreviewContainer').classList.add('hidden');
            });

            document.getElementById('formImage').addEventListener('change', function(e) {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height; const MAX = 600;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                        document.getElementById('formImageDataUrl').value = dataUrl;
                        document.getElementById('imagePreview').src = dataUrl;
                        document.getElementById('imagePreviewContainer').classList.remove('hidden');
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });

            // ปรับปรุงปุ่มบันทึกให้เชื่อมกับ Cloud
            document.getElementById('saveBtn').addEventListener('click', async () => {
                const id = document.getElementById('formId').value || Date.now().toString();
                const data = {
                    id: id,
                    name: document.getElementById('formName').value.trim(),
                    lat: parseFloat(document.getElementById('formLat').value),
                    lng: parseFloat(document.getElementById('formLng').value),
                    image: document.getElementById('formImageDataUrl').value
                };

                if (!data.name || isNaN(data.lat)) return alert('กรอกข้อมูลไม่ครบ');

                // 1. บันทึกลงเครื่องก่อน (กันเน็ตหลุด)
                const idx = foundations.findIndex(f => f.id === id);
                if (idx >= 0) foundations[idx] = data; else foundations.push(data);
                localStorage.setItem('bridge_foundations', JSON.stringify(foundations));
                
                modal.classList.add('hidden');
                renderMapMarkers(); renderList();

                // 2. ส่งข้อมูลขึ้น Cloud (Google Sheets / Drive)
                if (GOOGLE_SCRIPT_URL === "วาง_URL_ของ_WEB_APP_ตรงนี้") {
                    alert("คุณยังไม่ได้ใส่ URL ของ Google Apps Script ในโค้ด ข้อมูลถูกเซฟลงมือถืออย่างเดียวครับ");
                    return;
                }

                document.getElementById('loadingModal').classList.remove('hidden');
                
                try {
                    // ใช้ mode: 'no-cors' ป้องกันปัญหา Cross-Origin จากโทรศัพท์
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    document.getElementById('loadingModal').classList.add('hidden');
                    alert('ซิงค์ข้อมูลขึ้น Google Sheets สำเร็จ!');
                } catch (error) {
                    document.getElementById('loadingModal').classList.add('hidden');
                    alert('ส่งขึ้น Cloud ไม่สำเร็จ (เน็ตอาจจะหลุด) แต่ข้อมูลยังเซฟอยู่ในเครื่องครับ!');
                }
            });

            window.editData = (id) => {
                const t = foundations.find(f => f.id === id);
                document.getElementById('formId').value = t.id; document.getElementById('formName').value = t.name;
                document.getElementById('formLat').value = t.lat; document.getElementById('formLng').value = t.lng;
                document.getElementById('formImageDataUrl').value = t.image || '';
                if (t.image) { document.getElementById('imagePreview').src = t.image; document.getElementById('imagePreviewContainer').classList.remove('hidden'); }
                modal.classList.remove('hidden');
            };

            window.deleteData = (id) => {
                if (confirm('ลบจุดนี้? (ถ้าส่งขึ้น Sheet ไปแล้ว จะต้องตามไปลบใน Sheet ด้วยตัวเองนะครับ)')) {
                    foundations = foundations.filter(f => f.id !== id);
                    localStorage.setItem('bridge_foundations', JSON.stringify(foundations));
                    if(activeTargetId === id) document.getElementById('stopNavBtn').click();
                    renderMapMarkers(); renderList();
                }
            };
        });
    </script>
</body>
</html>
